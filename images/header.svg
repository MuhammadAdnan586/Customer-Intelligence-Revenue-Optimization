  <!-- Bottom tag -->
  <text x="450" y="148" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#7fb3c8" text-anchor="middle" letter-spacing="2" font-weight="400">FASTAPI · NEXT.JS · MYSQL · RECHARTS</text>
